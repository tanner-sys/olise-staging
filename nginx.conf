server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* ^/(index\.html|registerSW\.js|sw\.js|manifest\.webmanifest|workbox-.*\.js)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location /desktop/ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    default_type application/json;
    try_files $uri =404;
  }
}
