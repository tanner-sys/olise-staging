name: Publish desktop manifest to staging

on:
  workflow_run:
    workflows: [Release Desktop]
    types: [completed]

jobs:
  publish-manifest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/${{ github.repository }}/releases/latest --jq .tag_name)
          gh release download "$TAG" -p latest.json -O public/desktop/latest.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build static site with desktop manifest
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BRAIN_URL: ${{ secrets.VITE_BRAIN_URL }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy staging with desktop manifest
        run: |
          TAG=staging-$(date +%Y%m%d%H%M%S)
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image olise-ui:${TAG} \
            --image olise-ui:staging \
            --platform linux/amd64 \
            -f Dockerfile.staging .
          az containerapp update \
            --name olise-ui-staging \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image "${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/olise-ui:${TAG}" \
            --revision-suffix "r${TAG#staging-}"
