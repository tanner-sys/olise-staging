name: Deploy Staging UI

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: olise-ui

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BRAIN_URL: ${{ secrets.VITE_BRAIN_URL }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.IMAGE_NAME }}:staging \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform linux/amd64 \
            -f Dockerfile.staging .

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: olise-ui-staging
          imageToDeploy: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
